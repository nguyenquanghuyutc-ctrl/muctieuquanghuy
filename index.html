<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lalia & Ba Làng - C-Level Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS tuỳ chỉnh cho cây thư mục (Line nối) */
        .tree-line { border-left: 2px dashed #cbd5e1; margin-left: 1rem; padding-left: 1.5rem; }
        .collapse-content { display: none; }
        .open > .collapse-content { display: block; }
        .toggle-icon { transition: transform 0.3s; }
        .open > .parent-header .toggle-icon { transform: rotate(90deg); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-blue-800">KẾ HOẠCH CHIẾN LƯỢC 30X</h1>
            <p class="text-gray-500 mt-2">Dữ liệu được đồng bộ Real-time từ Hệ thống AppSheet</p>
        </header>

        <div id="loader" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700 mx-auto"></div>
            <p class="mt-4 text-gray-500 font-medium">Đang tải dữ liệu từ trung tâm...</p>
        </div>

        <div id="dashboard" class="space-y-6 hidden"></div>
    </div>

    <script>
        // === CẤU HÌNH API CỦA ANH VÀO ĐÂY ===
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx38VJKnocxrkXNZOHylgUhfGoGn2vvT2-NhKyBLeu2X6cxYeGzttjEEa94_3JMNIru/exec"; 
        const SECRETE_TOKEN = "CEO_HUY_LALIA_2026";

        // Fetch API
        async function loadData() {
            try {
                const response = await fetch(`${GAS_WEBAPP_URL}?token=${SECRETE_TOKEN}`);
                const result = await response.json();
                
                if (result.status === "success") {
                    document.getElementById("loader").classList.add("hidden");
                    const dashboard = document.getElementById("dashboard");
                    dashboard.classList.remove("hidden");
                    
                    // Render HTML từ JSON
                    dashboard.innerHTML = renderTree(result.data, true);
                    attachToggleEvents();
                } else {
                    alert("Lỗi: " + result.message);
                }
            } catch (error) {
                console.error("Lỗi kết nối:", error);
                document.getElementById("loader").innerHTML = `<p class="text-red-500">Lỗi kết nối hệ thống. Vui lòng kiểm tra lại Link WebApp.</p>`;
            }
        }

        // Đệ quy vẽ HTML cây thư mục
        function renderTree(nodes, isRoot = false) {
            if (!nodes || nodes.length === 0) return '';
            
            let html = `<div class="${isRoot ? '' : 'tree-line mt-2'} space-y-3">`;
            
            nodes.forEach(node => {
                const hasChildren = node.children && node.children.length > 0;
                
                // Set màu sắc theo mức độ ưu tiên
                let badgeColor = "bg-gray-100 text-gray-800";
                if (node.uuTien === "Rất gấp") badgeColor = "bg-red-100 text-red-800 border-red-200";
                if (node.uuTien === "Gấp") badgeColor = "bg-orange-100 text-orange-800 border-orange-200";

                // Set màu cho Cấp độ
                let capDoColor = "text-blue-700 bg-blue-50";
                if (node.capDo.includes("Năm")) capDoColor = "text-purple-800 bg-purple-100 uppercase tracking-wide font-bold";
                if (node.capDo.includes("Quý")) capDoColor = "text-blue-800 bg-blue-100 font-bold";
                
                html += `
                <div class="card-item bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden ${hasChildren ? 'cursor-pointer' : ''}">
                    <div class="parent-header p-4 hover:bg-gray-50 flex items-start justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                ${hasChildren ? `<svg class="toggle-icon w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>` : `<span class="w-5"></span>`}
                                <span class="text-xs px-2 py-1 rounded ${capDoColor}">${node.capDo}</span>
                                <span class="text-xs px-2 py-1 rounded border ${badgeColor}">${node.uuTien}</span>
                            </div>
                            <h3 class="text-lg font-semibold text-gray-800 ml-7">${node.mucTieu}</h3>
                            <p class="text-sm text-gray-500 ml-7 mt-1">${node.moTa}</p>
                        </div>
                        <div class="text-right text-sm">
                            <div class="font-medium text-gray-700">${node.nguoiThucHien}</div>
                            <div class="text-gray-500 flex items-center justify-end gap-1 mt-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                ${node.hanHoanThanh}
                            </div>
                        </div>
                    </div>
                    
                    ${hasChildren ? `<div class="collapse-content bg-gray-50 p-2 md:p-4 border-t border-gray-100">${renderTree(node.children)}</div>` : ''}
                </div>`;
            });
            
            html += `</div>`;
            return html;
        }

        // Gắn sự kiện đóng/mở thẻ
        function attachToggleEvents() {
            document.querySelectorAll('.parent-header').forEach(header => {
                header.addEventListener('click', (e) => {
                    const card = header.parentElement;
                    if (card.querySelector('.collapse-content')) {
                        card.classList.toggle('open');
                    }
                });
            });
        }

        // Khởi chạy
        loadData();
    </script>
</body>
</html>
