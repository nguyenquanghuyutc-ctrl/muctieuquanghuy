<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lalia Strategy OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
        .kanban-column { min-height: 500px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Lalia <span class="text-indigo-600">Strategy OS</span></h1>
                <p class="text-slate-500 font-medium">Hệ điều hành mục tiêu CEO Nguyễn Quang Huy</p>
            </div>
            <div class="glass p-2 rounded-2xl flex gap-2 shadow-xl">
                <button onclick="switchTab('tree')" id="btn-tree" class="px-6 py-2 rounded-xl font-bold transition-all tab-active flex items-center gap-2"><i data-lucide="layers"></i> Chiến lược</button>
                <button onclick="switchTab('kanban')" id="btn-kanban" class="px-6 py-2 rounded-xl font-bold transition-all text-slate-500 flex items-center gap-2"><i data-lucide="trello"></i> Kanban</button>
                <button onclick="switchTab('gantt')" id="btn-gantt" class="px-6 py-2 rounded-xl font-bold transition-all text-slate-500 flex items-center gap-2"><i data-lucide="calendar-range"></i> Tiến độ</button>
            </div>
        </div>

        <div id="loader" class="flex justify-center py-20"><div class="animate-spin rounded-full h-12 w-12 border-t-4 border-indigo-600"></div></div>

        <div id="view-tree" class="hidden space-y-4"></div>

        <div id="view-kanban" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="flex flex-col gap-4">
                <h2 class="font-bold text-slate-700 flex items-center gap-2 px-2"><span class="w-3 h-3 bg-slate-400 rounded-full"></span> CHỜ TRIỂN KHAI</h2>
                <div id="col-todo" class="kanban-column space-y-4 p-2 bg-slate-100 rounded-2xl border-2 border-dashed border-slate-200"></div>
            </div>
            <div class="flex flex-col gap-4">
                <h2 class="font-bold text-indigo-600 flex items-center gap-2 px-2"><span class="w-3 h-3 bg-indigo-500 rounded-full"></span> ĐANG THỰC HIỆN</h2>
                <div id="col-doing" class="kanban-column space-y-4 p-2 bg-indigo-50 rounded-2xl border-2 border-dashed border-indigo-100"></div>
            </div>
            <div class="flex flex-col gap-4">
                <h2 class="font-bold text-emerald-600 flex items-center gap-2 px-2"><span class="w-3 h-3 bg-emerald-500 rounded-full"></span> ĐÃ HOÀN THÀNH</h2>
                <div id="col-done" class="kanban-column space-y-4 p-2 bg-emerald-50 rounded-2xl border-2 border-dashed border-emerald-100"></div>
            </div>
        </div>

        <div id="view-gantt" class="hidden glass p-8 rounded-3xl shadow-2xl text-center">
            <i data-lucide="construction" class="mx-auto w-16 h-16 text-indigo-300 mb-4"></i>
            <h2 class="text-2xl font-bold text-slate-800">Gantt Chart Pro</h2>
            <p class="text-slate-500">Tính năng đang được tối ưu hoá cho dữ liệu 90 ngày của anh Huy.</p>
        </div>
    </div>

    <script>
        const CONFIG = {
            API: "https://script.google.com/macros/s/AKfycbx38VJKnocxrkXNZOHylgUhfGoGn2vvT2-NhKyBLeu2X6cxYeGzttjEEa94_3JMNIru/exec",
            TOKEN: "CEO_HUY_LALIA_2026"
        };

        let rawData = [];

        // Hàm cắt số (Clean Label)
        const cleanLabel = (text) => text.replace(/^\d+\.\s*/, '');

        async function init() {
            const res = await fetch(`${CONFIG.API}?token=${CONFIG.TOKEN}`);
            const json = await res.json();
            rawData = json.data;
            document.getElementById('loader').classList.add('hidden');
            switchTab('tree');
            lucide.createIcons();
        }

        function switchTab(tab) {
            ['tree', 'kanban', 'gantt'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.remove('tab-active', 'text-indigo-600');
                document.getElementById(`btn-${t}`).classList.add('text-slate-500');
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('tab-active', 'text-indigo-600');
            
            if(tab === 'tree') renderTree();
            if(tab === 'kanban') renderKanban();
        }

        // --- RENDER TREE VIEW ---
        function renderTree() {
            const container = document.getElementById('view-tree');
            const buildTree = (parentId = "") => {
                const nodes = rawData.filter(d => d["ID cha"] == parentId);
                return nodes.map(node => `
                    <div class="mb-4">
                        <div class="glass p-5 rounded-3xl shadow-xl hover:shadow-2xl transition-all border-l-8 ${getBorderColor(node['Cấp độ'])}">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-[10px] font-extrabold uppercase tracking-widest px-2 py-1 rounded-lg bg-white/50 mb-2 inline-block">${cleanLabel(node['Cấp độ'])}</span>
                                    <h3 class="text-xl font-bold text-slate-800">${node['Mục tiêu']}</h3>
                                    <p class="text-sm text-slate-500 mt-1">${node['Mô tả chi tiết mong muốn'] || ''}</p>
                                </div>
                                <div class="text-right">
                                    <span class="text-xs font-bold text-slate-400 block mb-1">DEADLINE</span>
                                    <span class="text-sm font-bold text-slate-700">${new Date(node['Hạn hoàn thành']).toLocaleDateString('vi-VN')}</span>
                                </div>
                            </div>
                        </div>
                        <div class="ml-8 mt-4 border-l-2 border-slate-200 pl-6">${buildTree(node['ID'])}</div>
                    </div>
                `).join('');
            };
            container.innerHTML = buildTree();
        }

        // --- RENDER KANBAN VIEW ---
        function renderKanban() {
            const cols = { 'todo': '1. Tạo mới KH', 'doing': 'Đang thực hiện', 'done': 'Hoàn thành' };
            Object.keys(cols).forEach(key => {
                const el = document.getElementById(`col-${key}`);
                const tasks = rawData.filter(d => d['Cấp độ'].includes('Ngày') || d['Cấp độ'].includes('Tuần'));
                const filtered = tasks.filter(t => t['Trạng thái'] === cols[key]);
                
                el.innerHTML = filtered.map(t => `
                    <div data-id="${t['ID']}" class="bg-white p-4 rounded-2xl shadow-md border border-slate-100 cursor-move hover:ring-2 ring-indigo-400 transition-all">
                        <p class="text-xs font-bold text-indigo-500 mb-1">${cleanLabel(t['Cấp độ'])}</p>
                        <h4 class="font-bold text-slate-800">${t['Mục tiêu']}</h4>
                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-50">
                            <span class="text-[10px] text-slate-400">${t['Người thực hiện'] || 'CEO'}</span>
                            <span class="text-[10px] font-bold bg-slate-100 px-2 py-0.5 rounded-md">${new Date(t['Hạn hoàn thành']).toLocaleDateString('vi-VN')}</span>
                        </div>
                    </div>
                `).join('');

                new Sortable(el, {
                    group: 'kanban',
                    animation: 150,
                    onEnd: async (evt) => {
                        const id = evt.item.getAttribute('data-id');
                        const newStatus = cols[evt.to.id.replace('col-', '')];
                        await updateStatus(id, newStatus);
                    }
                });
            });
        }

        async function updateStatus(id, status) {
            // Hiệu ứng Toast đơn giản
            console.log(`Updating ${id} to ${status}...`);
            await fetch(CONFIG.API, {
                method: 'POST',
                body: JSON.stringify({ token: CONFIG.TOKEN, id: id, status: status })
            });
        }

        function getBorderColor(cap) {
            if (cap.includes('Năm')) return 'border-purple-500';
            if (cap.includes('Quý')) return 'border-indigo-500';
            if (cap.includes('Tháng')) return 'border-sky-500';
            return 'border-slate-300';
        }

        init();
    </script>
</body>
</html>
